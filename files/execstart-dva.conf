# Pass 3.7 migration bridge: the new /usr/local/bin/overwatch launcher
# requires a VM_NAME argument, but the original overwatch.service unit's
# ExecStart does not supply one. This drop-in overrides ExecStart to pass
# "dva" so the old unit continues to work after the launcher is replaced
# by the cookbook during iteration 1 of the Pass 3.7 migration.
#
# Removed in iteration 3 of the migration, when dva is switched from
# the old overwatch.service unit to the new overwatch@dva.service
# template unit.

[Service]
ExecStart=
ExecStart=/usr/local/bin/overwatch start dva
