# /etc/systemd/system/ollama.service.d/overwatch-mode.conf
#
# Mode gate for ollama. Refuses to start if the host isn't booted in
# host-mode. If we're in vm-mode (or any other mode), overwatch-mode
# sets the next-boot GRUB entry to overwatch-host-mode, schedules a
# reboot, and exits non-zero — which fails the unit, but the reboot
# is already in flight. After the reboot, overwatch-resume.service
# auto-starts ollama in host-mode.
#
# Managed by Chef (overwatch cookbook). Do not edit directly.

[Service]
ExecStartPre=/usr/local/bin/overwatch-mode require host
