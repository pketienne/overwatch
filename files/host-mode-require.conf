# /etc/systemd/system/<unit>.d/overwatch-mode.conf
#
# Generic host-mode gate for any service listed in
# node['overwatch']['host_mode_services']. Refuses to start if the host
# isn't booted in host-mode. If we're in vm-mode (or any other mode),
# overwatch-mode sets the persistent GRUB saved_entry to overwatch-host-mode,
# schedules a reboot, and exits non-zero — which fails the unit, but the
# reboot is already in flight. After the reboot, overwatch-resume.service
# iterates host_mode_services and auto-starts each one in host-mode.
#
# Managed by Chef (overwatch cookbook). Do not edit directly.

[Service]
ExecStartPre=/usr/local/bin/overwatch-mode require host
